services:
  postgres:
    image: postgres:16
    container_name: postgres_full
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: people
    ports:
      - "5632:5432"
    volumes:
      - ../../data/people.csv:/docker-entrypoint-initdb.d/people.csv
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql