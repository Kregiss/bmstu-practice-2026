services:
  clickhouse_fuzzy:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse_fuzzy
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - ../../data/people.csv:/var/lib/clickhouse/user_files/people.csv
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./users.xml:/etc/clickhouse-server/users.xml
